name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  format:
    name: Format
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v6
      - name: Run clang-format
        run: |
          find src include tests tools \( -name "*.cpp" -o -name "*.hpp" \) | xargs clang-format-22 --dry-run --Werror

  build:
    name: Build
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v6
      - name: Configure CMake
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_CXX_COMPILER=clang++-22 \
            -DCMAKE_C_COMPILER=clang-22 \
            -DCMAKE_TOOLCHAIN_FILE=${VCPKG_INSTALLATION_ROOT}/scripts/buildsystems/vcpkg.cmake
      - name: Build
        run: cmake --build build

  lint:
    name: Lint
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v6
      - name: Configure CMake
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_CXX_COMPILER=clang++-22 \
            -DCMAKE_C_COMPILER=clang-22 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_TOOLCHAIN_FILE=${VCPKG_INSTALLATION_ROOT}/scripts/buildsystems/vcpkg.cmake
      - name: Run clang-tidy
        run: |
          find src tools -name "*.cpp" | xargs clang-tidy-22 -p build

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v6
      - name: Configure CMake
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_CXX_COMPILER=clang++-22 \
            -DCMAKE_C_COMPILER=clang-22 \
            -DCMAKE_TOOLCHAIN_FILE=${VCPKG_INSTALLATION_ROOT}/scripts/buildsystems/vcpkg.cmake
      - name: Build tests
        run: cmake --build build --target baseball_tests
      - name: Run Unit Tests
        run: ./build/baseball_tests --gtest_filter="SimulatorTest.*"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v6
      - name: Configure CMake
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_CXX_COMPILER=clang++-22 \
            -DCMAKE_C_COMPILER=clang-22 \
            -DCMAKE_TOOLCHAIN_FILE=${VCPKG_INSTALLATION_ROOT}/scripts/buildsystems/vcpkg.cmake
      - name: Build tests
        run: cmake --build build --target baseball_tests
      - name: Run Integration Tests
        run: ./build/baseball_tests --gtest_filter="SimulatorIntegrationTest.*"
